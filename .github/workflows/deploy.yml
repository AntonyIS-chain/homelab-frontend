name: Deploy Home Lab

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Deploy

        uses: appleboy/ssh-action@v1.2.0

        with:

          host: ${{ secrets.HOST }}

          username: ${{ secrets.USERNAME }}

          key: ${{ secrets.SSH_KEY }}

          script: |
            cd /opt/apps/home-lab-demo
            git pull
            docker compose up -d --build